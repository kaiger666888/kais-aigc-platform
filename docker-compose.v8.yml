# =============================================================================
# KAIS AIGC Platform V8.0 — Docker Compose (Gold-Team Independent)
# =============================================================================
# 变更 (vs V6):
#   - 移除 kais-movie-agent（编排职责已迁移到 OpenClaw skill）
#   - 移除 kais-core-backend（movie-agent 的上游依赖，不再需要）
#   - gold-team 可独立启动，不依赖 movie-agent
#   - review-platform 标记为 optional
#
# 架构:
#   gold-team (GPU 执行) + comfyui-worker (推理) + redis (队列) + postgres (持久化)
#   review-platform (optional, 审核界面)
#
# 用法:
#   启动核心:  docker compose -f docker-compose.v8.yml up -d
#   仅 gold:   docker compose -f docker-compose.v8.yml up -d gold-team
#   开发 mock: docker compose -f docker-compose.v8.yml --profile mock up -d
#   停止:      docker compose -f docker-compose.v8.yml down
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # 1. kais-gold-team (统一执行 Agent) — 核心服务
  # ---------------------------------------------------------------------------
  # 负责: 调用 ComfyUI / 云端引擎执行图片/视频/音频生成任务
  # 需要 GPU 0 (RTX 3090) — 用于本地推理加速
  # Redis Streams 消费者，接收 gold-team 任务
  # ---------------------------------------------------------------------------
  kais-gold-team:
    build:
      context: ../kais-gold-team
      dockerfile: /home/kai/.openclaw/workspace/kais-aigc-platform/docker/gold-team/Dockerfile
    container_name: kais-gold-team
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GOLD_TEAM_PORT:-8002}:8002"
    env_file: .env
    environment:
      PORT: 8002
      COMFYUI_URL: http://comfyui-worker:8188
      REDIS_URL: redis://redis:6379
      OUTPUT_DIR: /mnt/agents/output
      MODELS_DIR: /opt/kais/models
      # CosyVoice2 TTS
      COSYVOICE_ROOT: /opt/CosyVoice
      COSYVOICE_MODEL_DIR: /opt/CosyVoice/pretrained_models/iic/CosyVoice2-0.5B
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ${OUTPUT_DIR:-/mnt/agents/output}:/mnt/agents/output
      - ${MODELS_DIR:-/opt/kais/models}:/opt/kais/models:ro
      - cosyvoice-models:/opt/CosyVoice/pretrained_models
    networks:
      - kais-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]     # GPU 0 = RTX 3090
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      comfyui-worker:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # 2. comfyui-worker (ComfyUI 推理引擎) — gold-team 依赖
  # ---------------------------------------------------------------------------
  comfyui-worker:
    build:
      context: .
      dockerfile: docker/comfyui-worker/Dockerfile
    container_name: comfyui-worker
    restart: unless-stopped
    ports:
      - "127.0.0.1:${COMFYUI_PORT:-8188}:8188"
    env_file: .env
    environment:
      COMFYUI_LISTEN: "0.0.0.0"
      COMFYUI_PORT: 8188
      OUTPUT_DIR: /mnt/agents/output
      MODELS_DIR: /opt/kais/models
    volumes:
      - ${OUTPUT_DIR:-/mnt/agents/output}:/mnt/agents/output
      - ${MODELS_DIR:-/opt/kais/models}:/opt/kais/models
      - comfyui-custom-nodes:/app/ComfyUI/custom_nodes
    networks:
      - kais-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]     # GPU 0 = RTX 3090
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8188/system_stats')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # 3. kais-review-platform (审核平台) — OPTIONAL
  # ---------------------------------------------------------------------------
  # 按需启动: docker compose -f docker-compose.v8.yml up -d review-platform
  # ---------------------------------------------------------------------------
  kais-review-platform:
    build:
      context: ../kais-review-platform
      dockerfile: Dockerfile
    container_name: kais-review-platform
    restart: unless-stopped
    profiles:
      - review        # 按需启动，不在默认 up 中
    ports:
      - "127.0.0.1:${REVIEW_PORT:-8090}:8090"
    env_file: .env
    environment:
      PORT: 8090
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-kais}:${POSTGRES_PASSWORD:-kais}@audit-db:5432/${POSTGRES_DB:-kais_audit}
      API_KEY: ${REVIEW_API_KEY:-kais-review-dev-key}
      JWT_SECRET: ${REVIEW_JWT_SECRET:-kais-review-jwt-dev-2026}
      REDIS_URL: redis://172.18.0.1:6379/0
      OUTPUT_DIR: /mnt/agents/output
    volumes:
      - ${OUTPUT_DIR:-/mnt/agents/output}:/mnt/agents/output:ro
    networks:
      - kais-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      audit-db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # 4. audit-db (PostgreSQL 15)
  # ---------------------------------------------------------------------------
  audit-db:
    image: postgres:15-alpine
    container_name: kais-audit-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kais}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kais}
      POSTGRES_DB: ${POSTGRES_DB:-kais_audit}
    volumes:
      - audit-data:/var/lib/postgresql/data
    networks:
      - kais-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kais}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # 5. redis (缓存 + 消息队列)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kais-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6390:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - kais-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Mock Profiles (开发阶段替代真实 GPU 服务)
  # ===========================================================================
  kais-gold-team-mock:
    build:
      context: .
      dockerfile: docker/gold-team/Dockerfile.mock
    container_name: kais-gold-team-mock
    restart: unless-stopped
    profiles:
      - mock
    ports:
      - "127.0.0.1:${GOLD_TEAM_PORT:-8002}:8002"
    environment:
      PORT: 8002
      MOCK_MODE: "true"
    volumes:
      - ${OUTPUT_DIR:-/mnt/agents/output}:/mnt/agents/output
    networks:
      - kais-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  comfyui-worker-mock:
    build:
      context: .
      dockerfile: docker/comfyui-worker/Dockerfile.mock
    container_name: comfyui-worker-mock
    restart: unless-stopped
    profiles:
      - mock
    ports:
      - "127.0.0.1:${COMFYUI_PORT:-8188}:8188"
    environment:
      MOCK_MODE: "true"
    networks:
      - kais-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8188/system_stats')"]
      interval: 15s
      timeout: 5s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  kais-net:
    name: kais-net
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  audit-data:
    name: kais-audit-data
  redis-data:
    name: kais-redis-data
  comfyui-custom-nodes:
    name: kais-comfyui-custom-nodes
  cosyvoice-models:
    name: kais-cosyvoice-models
