# =============================================================================
# KAIS AIGC Platform V6.0 — Smoke Test Compose
# 4 服务 + PG + Redis，无 GPU，一键验证全栈集成
# =============================================================================
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: review
      POSTGRES_PASSWORD: review
      POSTGRES_DB: reviewdb
    ports:
      - "5490:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review"]
      interval: 5s
      timeout: 3s
      retries: 5

  core-backend:
    image: kais-core-backend:latest
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  movie-agent:
    image: kais-movie-agent:latest
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      GOLD_TEAM_URL: http://gold-team:8002
      REVIEW_PLATFORM_URL: http://review-platform:8090
      CORE_BACKEND_URL: http://core-backend:8000
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    volumes:
      - /tmp/movie-agent:/tmp/movie-agent
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  gold-team:
    image: kais-gold-team:latest
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  review-platform:
    image: kais-review-platform:latest
    ports:
      - "8091:8090"
    environment:
      PORT: 8090
      POSTGRES_URL: postgresql+asyncpg://review:review@postgres:5432/reviewdb
      REDIS_URL: redis://redis:6379/0
      API_KEY: test-api-key
      JWT_SECRET: test-jwt-secret-for-smoke-test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
